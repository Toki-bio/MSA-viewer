<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSA Dot Plot</title>
<style>
* { box-sizing: border-box; margin: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f0f0f0; display: flex; height: 100vh; overflow: hidden; }
#controls { background: #fff; border-bottom: 1px solid #ddd; padding: 8px 12px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; font-size: 12px; }
#controls label { display: inline-flex; align-items: center; gap: 3px; }
#controls input[type=range] { width: 90px; }
#controls input[type=number] { width: 48px; }
#controls button { font-size: 11px; padding: 3px 10px; cursor: pointer; }
#main { display: flex; flex: 1; overflow: hidden; }
#viewport { flex: 1; overflow: auto; position: relative; cursor: crosshair; background: #fff; }
#sidebar { width: 300px; background: #fafafa; border-left: 1px solid #ddd; display: flex; flex-direction: column; overflow: hidden; }
#info { padding: 8px; font-size: 11px; color: #555; border-bottom: 1px solid #eee; min-height: 34px; }
#alignment { flex: 1; overflow: auto; padding: 8px; font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre; }
#status { padding: 8px; font-size: 11px; color: #888; border-top: 1px solid #eee; }
#noData { color: #999; text-align: center; padding: 40px 20px; }
.error { color: #c00; }
</style>
</head>
<body>
<div id="top">
  <div id="controls">
    <strong id="title">Dot Plot</strong>
    <label>Window <input type="number" id="win" value="9" min="1" max="61" step="2"></label>
    <label>Threshold <input type="range" id="thr" min="0" max="100" value="55"><span id="thrVal">55%</span></label>
    <label>Context <input type="number" id="ctx" value="5" min="0" max="40"> bp</label>
    <button id="recalcBtn">↻ Recalculate</button>
    <button id="exportPng">PNG</button>
    <button id="exportSvg">SVG</button>
    <span id="status"></span>
  </div>
</div>
<div id="main">
  <div id="viewport"><canvas id="cv"></canvas></div>
  <div id="sidebar">
    <div id="info">Hover over the plot…</div>
    <div id="alignment">A: -
   |
B: -</div>
    <div id="status2" style="padding:8px;font-size:11px;color:#888;border-top:1px solid #eee;">
      <button id="copyBtn" style="font-size:11px;padding:3px 10px;cursor:pointer;">📋 Copy Region</button>
      <button id="fitBtn" style="font-size:11px;padding:3px 10px;cursor:pointer;margin-left:4px;">⊞ Fit View</button>
    </div>
  </div>
</div>
<script>
// --- Worker (inlined via blob) ---
const workerCode = `
self.addEventListener('message', (e) => {
  try {
    const { seqA, seqB, windowSize } = e.data;
    const N = seqA.length, M = seqB.length;
    const half = (windowSize - 1) >> 1;
    const aEnc = new Uint8Array(N), bEnc = new Uint8Array(M);
    for (let i = 0; i < N; i++) aEnc[i] = seqA.charCodeAt(i);
    for (let j = 0; j < M; j++) bEnc[j] = seqB.charCodeAt(j);
    const scores = new Int16Array(N * M), prefix = new Int32Array(Math.max(N,M) + 1);
    let gMin = 0x7FFF, gMax = -0x8000;
    for (let dd = 0; dd < N + M - 1; dd++) {
      const d = dd - (N - 1);
      const i0 = d < 0 ? -d : 0, j0 = d < 0 ? 0 : d;
      const len = Math.min(N - i0, M - j0);
      prefix[0] = 0;
      for (let k = 0; k < len; k++) prefix[k+1] = prefix[k] + (aEnc[i0+k] === bEnc[j0+k] ? 1 : 0);
      for (let k = 0; k < len; k++) {
        const lo = k - half, hi = k + half + 1;
        const s = prefix[hi < len ? hi : len] - prefix[lo > 0 ? lo : 0];
        scores[(i0+k)*M + (j0+k)] = s;
        if (s < gMin) gMin = s; if (s > gMax) gMax = s;
      }
    }
    self.postMessage({ scores, rows: N, cols: M, min: gMin, max: gMax }, [scores.buffer]);
  } catch (err) { self.postMessage({ error: err.message || String(err) }); }
});`;
const workerBlob = new Blob([workerCode], { type: 'application/javascript' });
const workerUrl = URL.createObjectURL(workerBlob);
let worker = new Worker(workerUrl);
let workerBusy = false;

// --- State ---
const AXIS = 50; // axis padding in px
let state = {
  seqA: '', seqB: '', nameA: 'A', nameB: 'B',
  scores: null, rows: 0, cols: 0, scoreMin: 0, scoreMax: 1,
  zoom: 1, threshold: 0.55, windowSize: 9,
  dotImage: null,
  hoverRow: -1, hoverCol: -1,
  pinnedRow: -1, pinnedCol: -1,
  copyRegion: null, // { aSlice, bSlice, aStart, bStart, nameA, nameB }
};

// --- DOM ---
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const viewport = document.getElementById('viewport');
const infoEl = document.getElementById('info');
const alignEl = document.getElementById('alignment');
const statusEl = document.getElementById('status');
const titleEl = document.getElementById('title');
const thrSlider = document.getElementById('thr');
const thrVal = document.getElementById('thrVal');
const winInput = document.getElementById('win');
const ctxInput = document.getElementById('ctx');

// --- Load data from sessionStorage ---
function loadData() {
  try {
    const raw = sessionStorage.getItem('_dotplot_data');
    if (!raw) return false;
    const d = JSON.parse(raw);
    state.seqA = d.seqA.toUpperCase();
    state.seqB = d.seqB.toUpperCase();
    state.nameA = d.nameA || 'A';
    state.nameB = d.nameB || 'B';
    sessionStorage.removeItem('_dotplot_data');
    return true;
  } catch (e) { return false; }
}

// --- Compute ---
function compute() {
  if (!state.seqA || !state.seqB || workerBusy) return;
  workerBusy = true;
  statusEl.textContent = `Computing ${state.seqA.length} × ${state.seqB.length}…`;
  const t0 = performance.now();
  worker.onmessage = (e) => {
    workerBusy = false;
    if (e.data.error) { statusEl.textContent = 'Error: ' + e.data.error; return; }
    state.scores = new Int16Array(e.data.scores);
    state.rows = e.data.rows;
    state.cols = e.data.cols;
    state.scoreMin = e.data.min;
    state.scoreMax = e.data.max;
    buildImage();
    fitView();
    state.hoverRow = state.hoverCol = -1;
    state.pinnedRow = state.pinnedCol = -1;
    const ms = performance.now() - t0;
    statusEl.textContent = `${state.rows}×${state.cols} in ${ms < 1000 ? ms.toFixed(0)+'ms' : (ms/1000).toFixed(1)+'s'}`;
    render();
  };
  worker.onerror = (e) => { workerBusy = false; statusEl.textContent = 'Worker error'; };
  worker.postMessage({ seqA: state.seqA, seqB: state.seqB, windowSize: state.windowSize });
}

function buildImage() {
  if (!state.scores) return;
  const img = new ImageData(state.cols, state.rows);
  const d = img.data, range = state.scoreMax - state.scoreMin || 1;
  const thr = state.threshold;
  for (let i = 0, j = 0; i < state.rows * state.cols; i++, j += 4) {
    const n = (state.scores[i] - state.scoreMin) / range;
    const v = n >= thr ? Math.round((1 - n) * 255) : 255;
    d[j] = v; d[j+1] = v; d[j+2] = v; d[j+3] = 255;
  }
  state.dotImage = img;
}

function fitView() {
  if (!state.rows || !state.cols) return;
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  state.zoom = Math.max(1, Math.min(
    Math.floor((vw - AXIS - 10) / state.cols),
    Math.floor((vh - AXIS - 10) / state.rows)
  ));
  render();
}

// --- Walk diagonal ---
function walkDiagonal(row, col) {
  if (!state.scores) return null;
  const range = state.scoreMax - state.scoreMin || 1;
  const thr = state.threshold;
  let r0 = row, c0 = col;
  while (r0 >= 0 && c0 >= 0) {
    if ((state.scores[r0 * state.cols + c0] - state.scoreMin) / range < thr) break;
    r0--; c0--;
  }
  r0++; c0++;
  let r1 = row + 1, c1 = col + 1;
  while (r1 < state.rows && c1 < state.cols) {
    if ((state.scores[r1 * state.cols + c1] - state.scoreMin) / range < thr) break;
    r1++; c1++;
  }
  return { r0, c0, r1, c1, len: r1 - r0 };
}

// --- Render (single canvas, no overlay complexity) ---
function render() {
  if (!state.dotImage) return;
  const { rows, cols, zoom } = state;
  const plotW = Math.round(cols * zoom), plotH = Math.round(rows * zoom);
  const tw = AXIS + plotW + 1, th = AXIS + plotH + 1;

  cv.width = tw; cv.height = th;
  cv.style.width = tw + 'px'; cv.style.height = th + 'px';

  // Dot image
  const tmp = document.createElement('canvas');
  tmp.width = cols; tmp.height = rows;
  tmp.getContext('2d').putImageData(state.dotImage, 0, 0);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(tmp, AXIS, AXIS, plotW, plotH);

  // Axes
  ctx.fillStyle = '#333'; ctx.font = '10px system-ui';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  const tickStepA = niceStep(rows, Math.floor((th - AXIS) / 20));
  for (let i = 0; i < rows; i += tickStepA) {
    const y = AXIS + Math.round(i * zoom) + Math.round(zoom / 2);
    ctx.fillText(String(i + 1), AXIS - 5, y);
    ctx.fillRect(AXIS - 3, y - 1, 6, 1);
  }
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  const tickStepB = niceStep(cols, Math.floor((tw - AXIS) / 20));
  for (let j = 0; j < cols; j += tickStepB) {
    const x = AXIS + Math.round(j * zoom) + Math.round(zoom / 2);
    ctx.save(); ctx.translate(x, AXIS - 5); ctx.rotate(-Math.PI / 2);
    ctx.fillText(String(j + 1), 0, 0);
    ctx.restore();
    ctx.fillRect(x - 1, AXIS - 3, 1, 6);
  }

  const colW = plotW / cols, rowH = plotH / rows;
  const pxSz = Math.max(2, Math.round(colW));

  // Highlight diagonal for hover position
  if (state.hoverRow >= 0 && state.hoverCol >= 0) {
    const diag = walkDiagonal(state.hoverRow, state.hoverCol);
    if (diag) {
      ctx.fillStyle = 'rgba(100,230,160,0.8)';
      for (let k = diag.r0; k < diag.r1; k++) {
        const j = diag.c0 + (k - diag.r0);
        ctx.fillRect(AXIS + Math.floor(j * colW), AXIS + Math.floor(k * rowH), pxSz, pxSz);
      }
    }
    // Crosshair
    const cx = AXIS + (state.hoverCol + 0.5) * colW;
    const cy = AXIS + (state.hoverRow + 0.5) * rowH;
    ctx.strokeStyle = 'rgba(80,160,255,0.6)'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(AXIS, cy); ctx.lineTo(AXIS + plotW, cy);
    ctx.moveTo(cx, AXIS); ctx.lineTo(cx, AXIS + plotH);
    ctx.stroke();
    ctx.fillStyle = 'rgba(80,160,255,0.9)'; ctx.font = 'bold 10px system-ui';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText(String(state.hoverCol + 1), cx, AXIS - 1);
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText(String(state.hoverRow + 1), AXIS - 2, cy);
  }

  // Pinned marker
  if (state.pinnedRow >= 0 && state.pinnedCol >= 0) {
    const cx = AXIS + (state.pinnedCol + 0.5) * colW;
    const cy = AXIS + (state.pinnedRow + 0.5) * rowH;
    ctx.strokeStyle = 'rgba(220,50,50,0.8)'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(AXIS, cy); ctx.lineTo(AXIS + plotW, cy);
    ctx.moveTo(cx, AXIS); ctx.lineTo(cx, AXIS + plotH);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(220,50,50,0.9)'; ctx.lineWidth = 2;
    ctx.strokeRect(AXIS + Math.floor(state.pinnedCol * colW) - 1, AXIS + Math.floor(state.pinnedRow * rowH) - 1, colW + 2, rowH + 2);
    ctx.fillStyle = 'rgba(220,50,50,0.9)'; ctx.font = 'bold 10px system-ui';
    ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
    ctx.fillText('PIN: A' + String(state.pinnedRow + 1) + ' / B' + String(state.pinnedCol + 1), AXIS + 4, AXIS - 1);
  }
}

// --- Update info panel on hover ---
function updateInfo(row, col) {
  if (row < 0 || col < 0 || row >= state.rows || col >= state.cols) {
    infoEl.textContent = 'Hover over the plot…';
    alignEl.textContent = 'A: -\n   |\nB: -';
    return;
  }
  const range = state.scoreMax - state.scoreMin || 1;
  const norm = (state.scores[row * state.cols + col] - state.scoreMin) / range;
  infoEl.textContent = `A:${row + 1}/${state.rows}  B:${col + 1}/${state.cols}  score=${norm.toFixed(3)}  (${state.seqA[row] || 'N'} vs ${state.seqB[col] || 'N'})`;

  const diag = walkDiagonal(row, col);
  if (!diag) { alignEl.textContent = 'A: -\n   |\nB: -'; return; }

  const ctxRadius = parseInt(ctxInput.value) || 5;
  const maxSlice = diag.len + 2 * ctxRadius;
  const aStart = Math.max(0, diag.r0 - ctxRadius);
  const bStart = Math.max(0, diag.c0 - ctxRadius);
  const availA = state.seqA.length - aStart;
  const availB = state.seqB.length - bStart;
  const sliceLen = Math.min(maxSlice, availA, availB);

  const aSlice = state.seqA.slice(aStart, aStart + sliceLen);
  const bSlice = state.seqB.slice(bStart, bStart + sliceLen);
  const matchStartA = diag.r0 - aStart;
  const matchEndA = diag.r1 - aStart;

  let guide = '';
  for (let i = 0; i < sliceLen; i++) {
    const ch = aSlice[i] === bSlice[i] ? '|' : ' ';
    if (i >= matchStartA && i < matchEndA) {
      guide += '[' + ch + ']';
    } else {
      guide += ' ' + ch + ' ';
    }
  }

  alignEl.textContent =
    `A ${String(aStart + 1).padStart(5)}  ${aSlice}\n` +
    `          ${guide}\n` +
    `B ${String(bStart + 1).padStart(5)}  ${bSlice}`;

  // Store for copy
  state.copyRegion = { aSlice, bSlice, aStart, bStart, nameA: state.nameA, nameB: state.nameB };
}

function niceStep(len, maxTicks) {
  const raw = len / maxTicks;
  const mag = Math.pow(10, Math.floor(Math.log10(raw)));
  const norm = raw / mag;
  let step = norm <= 1 ? 1 : norm <= 2 ? 2 : norm <= 5 ? 5 : 10;
  return Math.max(1, Math.round(step * mag));
}

// --- Events ---
cv.addEventListener('mousemove', (e) => {
  if (!state.scores) return;
  const rect = cv.getBoundingClientRect();
  const col = Math.floor((e.clientX - rect.left - AXIS) / state.zoom);
  const row = Math.floor((e.clientY - rect.top - AXIS) / state.zoom);
  if (row < 0 || col < 0 || row >= state.rows || col >= state.cols) {
    if (state.hoverRow >= 0) { state.hoverRow = state.hoverCol = -1; render(); updateInfo(-1, -1); }
    return;
  }
  if (row === state.hoverRow && col === state.hoverCol) return;
  state.hoverRow = row; state.hoverCol = col;
  render();
  updateInfo(row, col);
});

cv.addEventListener('mouseleave', () => {
  state.hoverRow = state.hoverCol = -1;
  render();
  updateInfo(-1, -1);
});

cv.addEventListener('click', (e) => {
  if (!state.scores) return;
  const rect = cv.getBoundingClientRect();
  const col = Math.floor((e.clientX - rect.left - AXIS) / state.zoom);
  const row = Math.floor((e.clientY - rect.top - AXIS) / state.zoom);
  if (row < 0 || col < 0 || row >= state.rows || col >= state.cols) return;
  state.pinnedRow = row; state.pinnedCol = col;
  state.hoverRow = row; state.hoverCol = col;
  render();
  updateInfo(row, col);
});

viewport.addEventListener('wheel', (e) => {
  if (!state.scores) return;
  e.preventDefault();
  const oldZoom = state.zoom;
  state.zoom = Math.max(1, Math.min(20, state.zoom + (e.deltaY < 0 ? 1 : -1)));
  if (state.zoom !== oldZoom) render();
}, { passive: false });

// --- Buttons ---
document.getElementById('recalcBtn').addEventListener('click', () => {
  state.windowSize = parseInt(winInput.value) || 9;
  state.threshold = parseInt(thrSlider.value) / 100;
  compute();
});

thrSlider.addEventListener('input', () => {
  thrVal.textContent = thrSlider.value + '%';
  state.threshold = parseInt(thrSlider.value) / 100;
  if (state.scores) { buildImage(); render(); updateInfo(state.hoverRow, state.hoverCol); }
});

winInput.addEventListener('change', () => {
  state.windowSize = parseInt(winInput.value) || 9;
});

ctxInput.addEventListener('change', () => {
  updateInfo(state.hoverRow, state.hoverCol);
});

document.getElementById('fitBtn').addEventListener('click', fitView);

document.getElementById('exportPng').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = `dotplot_${state.nameA}_vs_${state.nameB}.png`;
  link.href = cv.toDataURL('image/png');
  link.click();
});

document.getElementById('exportSvg').addEventListener('click', () => {
  const dataUrl = cv.toDataURL('image/png');
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
    width="${cv.width}" height="${cv.height}" viewBox="0 0 ${cv.width} ${cv.height}">
    <image width="${cv.width}" height="${cv.height}" xlink:href="${dataUrl}"/>
    <text x="4" y="12" font-size="10" font-family="system-ui" fill="#666">
      ${state.nameA} vs ${state.nameB} | w=${state.windowSize} thr=${Math.round(state.threshold * 100)}%
    </text>
  </svg>`;
  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const link = document.createElement('a');
  link.download = `dotplot_${state.nameA}_vs_${state.nameB}.svg`;
  link.href = URL.createObjectURL(blob);
  link.click();
  URL.revokeObjectURL(link.href);
});

document.getElementById('copyBtn').addEventListener('click', () => {
  if (state.copyRegion) {
    const r = state.copyRegion;
    const fasta = `>${r.nameA}_${r.aStart + 1}-${r.aStart + r.aSlice.length}\n${r.aSlice}\n` +
                  `>${r.nameB}_${r.bStart + 1}-${r.bStart + r.bSlice.length}\n${r.bSlice}`;
    navigator.clipboard.writeText(fasta).then(() => {
      statusEl.textContent = 'Copied!';
      setTimeout(() => { statusEl.textContent = ''; }, 2000);
    }).catch(() => statusEl.textContent = 'Copy failed');
  } else {
    statusEl.textContent = 'Hover over the plot first';
    setTimeout(() => { statusEl.textContent = ''; }, 2000);
  }
});

// --- Init ---
if (loadData()) {
  titleEl.textContent = `Dot Plot: ${state.nameA} vs ${state.nameB}`;
  winInput.value = state.windowSize;
  thrSlider.value = Math.round(state.threshold * 100);
  thrVal.textContent = Math.round(state.threshold * 100) + '%';
  compute();
}
</script>
</body>
</html>
